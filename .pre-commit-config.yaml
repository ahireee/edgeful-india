repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - polars>=1.0
          - duckdb>=1.0
          - pydantic>=2.6
          - types-requests
          - python-dotenv>=1.0
          - tenacity>=9.0
          - rich>=13.7
          - pytest>=8.0
          - upstox-python-sdk>=2.21
          - typer>=0.12
        args: [--strict]
